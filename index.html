<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etsy Fee Calculator</title>

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
.container {max-width:420px;margin:auto;background:#1e293b;padding:20px;border-radius:16px;}
input {width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none;}
button {width:100%;padding:14px;background:#22c55e;border:none;border-radius:10px;font-weight:bold;}
.result {margin-top:20px;background:#020617;padding:15px;border-radius:12px;}
.share-btn {margin-top:10px;padding:10px;background:#22c55e;border:none;border-radius:8px;font-weight:bold;width:100%;}
</style>
</head>

<body>

<div class="container">
<h2>💰 Etsy Fee Calculator</h2>

<input id="price" placeholder="Sale Price">
<input id="shipping" placeholder="Shipping Charged">
<input id="cost" placeholder="Your Cost">
<input id="shipcost" placeholder="Shipping Cost">

<button onclick="calculate()">Calculate</button>

<div id="result" class="result"></div>
</div>

<div style="text-align:center;font-size:12px;opacity:0.5;margin-top:20px;">
  © 2026 Etsy Fees Calculator · Not affiliated with Etsy
</div>

<script>
function calculate() {
  let price = parseFloat(document.getElementById("price").value) || 0;
  let shipping = parseFloat(document.getElementById("shipping").value) || 0;
  let cost = parseFloat(document.getElementById("cost").value) || 0;
  let shipcost = parseFloat(document.getElementById("shipcost").value) || 0;

  let gross = price + shipping;

  let fees = 0.20 + (gross * 0.065) + (gross * 0.03 + 0.25);
  let profit = gross - fees - cost - shipcost;
  let margin = gross > 0 ? (profit / gross) * 100 : 0;

  let salesNeeded = profit > 0 ? Math.ceil(1000 / profit) : "∞";
  let suggestedPrice = (cost + shipcost + fees) / 0.7;

  document.getElementById("result").innerHTML =
    "😳 Etsy takes: $" + fees.toFixed(2) + "<br>" +
    "💸 That’s " + ((fees / gross) * 100).toFixed(1) + "% of your revenue<br><br>" +

    "You keep: $" + profit.toFixed(2) + "<br>" +
    "Margin: " + margin.toFixed(1) + "%<br><br>" +

    "🔥 You're working for $" + profit.toFixed(2) + "<br><br>" +

    "💡 You could lower price to: $" + suggestedPrice.toFixed(2) + "<br><br>" +

    "📈 " + salesNeeded + " sales = $1,000/month<br><br>" +

    "👀 Share this with another Etsy seller<br>" +

    "<button class='share-btn' onclick='shareResult()'>📤 Share Results</button>";
}

function shareResult() {
  if (navigator.share) {
    navigator.share({
      title: 'Etsy Calculator',
      text: '😳 I just realized how much Etsy takes…',
      url: window.location.href
    });
  }
}
</script>

</body>
</html>
