<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etsy Profit Calculator – How Much Does Etsy Take?</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

.container {
  max-width:420px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:16px;
}

h2 {
  margin-bottom:15px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  font-size:14px;
}

button {
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
}

.result {
  margin-top:20px;
  background:#020617;
  padding:15px;
  border-radius:12px;
  line-height:1.6;
}

.share-btn {
  margin-top:10px;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-weight:bold;
  width:100%;
  font-size:15px;
}
</style>
</head>

<body>

<div class="container">
  <h2>💰 Etsy Profit Calculator</h2>

  <input id="price" placeholder="Sale Price ($)">
  <input id="shipping" placeholder="Shipping Charged ($)">
  <input id="cost" placeholder="Your Cost (materials + labor)">
  <input id="shipcost" placeholder="Your Shipping Cost">

  <button onclick="calculate()">Calculate</button>

  <div id="result" class="result"></div>
</div>

<!-- Footer -->
<div style="text-align:center;font-size:12px;opacity:0.5;margin-top:20px;">
  © 2026 Etsy Profit Calculator · Not affiliated with Etsy
</div>

<script>
function calculate() {
  let price = parseFloat(document.getElementById("price").value) || 0;
  let shipping = parseFloat(document.getElementById("shipping").value) || 0;
  let cost = parseFloat(document.getElementById("cost").value) || 0;
  let shipcost = parseFloat(document.getElementById("shipcost").value) || 0;

  let gross = price + shipping;

  let fees = 0.20 + (gross * 0.065) + (gross * 0.03 + 0.25);
  let profit = gross - fees - cost - shipcost;

  let margin = gross > 0 ? (profit / gross) * 100 : 0;
  let percent = gross > 0 ? (fees / gross) * 100 : 0;

  let salesNeeded = profit > 0 ? Math.ceil(1000 / profit) : "∞";
  let suggestedPrice = (cost + shipcost + fees) / 0.7;

  let message = margin >= 30 ? "Good margin ✅" : "Low margin ❌";
  let color = margin >= 30 ? "#4ade80" : "#f87171";

  document.getElementById("result").innerHTML =
    "😳 Etsy takes: $" + fees.toFixed(2) + "<br>" +
    "💸 That’s " + percent.toFixed(1) + "% of your revenue<br><br>" +

    "You keep: <b>$" + profit.toFixed(2) + "</b><br>" +
    "Margin: " + margin.toFixed(1) + "%<br>" +
    "<span style='color:" + color + "'>" + message + "</span><br><br>" +

    "🔥 You're working for <b>$" + profit.toFixed(2) + "</b> on a $" + gross.toFixed(2) + " sale<br><br>" +

    "💡 To maintain 30% margin:<br>" +
    "👉 You could lower price to: <b>$" + suggestedPrice.toFixed(2) + "</b> and still keep 30% margin<br><br>" +

    "📈 " + salesNeeded + " sales = $1,000/month<br><br>" +

    "👀 Share this with another Etsy seller<br>" +

    "<button class='share-btn' onclick='shareResult()'>📤 Share Results</button>";
}

function shareResult() {
  if (navigator.share) {
    navigator.share({
      title: 'Etsy Profit Calculator',
      text: '😳 I just realized how much Etsy takes from each sale… try this',
      url: window.location.href
    });
  } else {
    alert("Sharing not supported on this device");
  }
}
</script>

</body>
</html>
