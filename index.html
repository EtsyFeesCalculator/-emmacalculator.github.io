<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etsy Profit Calculator – How Much Does Etsy Take?</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

.container {
  max-width:420px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:16px;
}

h2 {
  margin-bottom:15px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  font-size:14px;
}

button {
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
}

.result {
  margin-top:20px;
  background:#020617;
  padding:15px;
  border-radius:12px;
  line-height:1.6;
}

.share-btn {
  margin-top:10px;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-weight:bold;
  width:100%;
}
</style>
</head>

<body>

<div class="container">
  <h2>💰 Etsy Profit Calculator</h2>

  <input id="price" placeholder="Sale Price ($)">
  <input id="shipping" placeholder="Shipping Charged ($)">
  <input id="cost" placeholder="Your Cost (materials + labor)">
  <input id="shipcost" placeholder="Your Shipping Cost">

  <button id="calcBtn">Calculate</button>

  <div id="result" class="result"></div>
</div>

<div style="text-align:center;font-size:12px;opacity:0.5;margin-top:20px;">
  © 2026 Etsy Profit Calculator · Not affiliated with Etsy
</div>

<script>
document.getElementById("calcBtn").addEventListener("click", function () {

  var price = parseFloat(document.getElementById("price").value) || 0;
  var shipping = parseFloat(document.getElementById("shipping").value) || 0;
  var cost = parseFloat(document.getElementById("cost").value) || 0;
  var shipcost = parseFloat(document.getElementById("shipcost").value) || 0;

  var gross = price + shipping;

  var fees = 0.20 + (gross * 0.065) + (gross * 0.03 + 0.25);
  var profit = gross - fees - cost - shipcost;

  var margin = gross > 0 ? (profit / gross) * 100 : 0;
  var percent = gross > 0 ? (fees / gross) * 100 : 0;

  var salesNeeded = profit > 0 ? Math.ceil(1000 / profit) : "∞";
  var suggestedPrice = (cost + shipcost + fees) / 0.7;

  var message = margin >= 30 ? "Good margin ✅" : "Low margin ❌";
  var color = margin >= 30 ? "#4ade80" : "#f87171";

  var resultHTML = "";

  resultHTML += "😳 Etsy takes: $" + fees.toFixed(2) + "<br>";
  resultHTML += "💸 That’s " + percent.toFixed(1) + "% of your revenue<br><br>";

  resultHTML += "You keep: <b>$" + profit.toFixed(2) + "</b><br>";
  resultHTML += "Margin: " + margin.toFixed(1) + "%<br>";
  resultHTML += "<span style='color:" + color + "'>" + message + "</span><br><br>";

  resultHTML += "🔥 You're working for <b>$" + profit.toFixed(2) + "</b> on a $" + gross.toFixed(2) + " sale<br><br>";

  resultHTML += "💡 To maintain 30% margin:<br>";
  resultHTML += "👉 You could lower price to: <b>$" + suggestedPrice.toFixed(2) + "</b> and still keep 30% margin<br><br>";

  resultHTML += "📈 " + salesNeeded + " sales = $1,000/month<br><br>";

  resultHTML += "👀 Share this with another Etsy seller<br>";
  resultHTML += "<button class='share-btn' onclick='shareResult()'>📤 Share Results</button>";

  document.getElementById("result").innerHTML = resultHTML;
});

function shareResult() {
  if (navigator.share) {
    navigator.share({
      title: 'Etsy Profit Calculator',
      text: '😳 I just realized how much Etsy takes… try this',
      url: window.location.href
    });
  } else {
    alert("Sharing not supported");
  }
}
</script>

</body>
</html>
